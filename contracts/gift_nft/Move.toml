[package]
name = "gift_nft"
edition = "2024.beta"
version = "1.0.0"

[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet" }
# gift::mint requires the caller to hold 3 distinct-battle Chronicles, so it
# depends on the chronicle package (for the Chronicle type + battle_id accessor).
# Local path: both repos live side-by-side under ConsssLabs/. Publish chronicle
# FIRST so its published-at is recorded, then publish gift_nft.
chronicle = { local = "../../../contracts/sui" }

[addresses]
gift_nft = "0x0"
